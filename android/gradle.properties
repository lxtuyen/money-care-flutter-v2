org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
android.useAndroidX=true
android.enableJetifier=true
kotlin.incremental=false

# Avoid Kotlin daemon crashes
kotlin.compiler.execution.strategy=in-process

# (Optional) also disable Gradle daemon to be safe
org.gradle.daemon=false

