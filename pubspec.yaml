name: money_care
description: "Money Care"
publish_to: "none"
version: 1.1.0

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  intl: ^0.20.2
  http: ^1.3.0
  google_sign_in: ^7.2.0
  image_picker: ^1.1.2
  camera: ^0.12.0+1
  fl_chart: ^1.1.1
  flutter_svg: ^2.2.1
  dotted_border: ^3.1.0
  calendar_date_picker2: ^2.0.1
  flutter_dotenv: ^6.0.0
  percent_indicator: ^4.2.3
  speech_to_text: ^7.3.0

  # icons
  iconsax_flutter: ^1.0.0

  # state management
  get: ^4.7.3
  get_storage: ^2.1.1
  shared_preferences: ^2.5.2
  fpdart: ^1.1.0

  # firebase
  firebase_core: ^4.1.1
  firebase_auth: ^6.1.0
  cloud_firestore: ^6.0.2
  firebase_messaging: ^16.1.3
  flutter_local_notifications: ^21.0.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^3.2.5
  json_serializable: ^6.9.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_1024.png"

flutter:
  uses-material-design: true

  #------------------- Local Assets ------------------- #
  assets:
    - assets/images/
    - assets/icons/
    - .env

  #------------------- Local Fonts ------------------- #
  fonts:
    - family: BeVietnamPro
      fonts:
        - asset: assets/fonts/BeVietnamPro-Regular.ttf
        - asset: assets/fonts/BeVietnamPro-Medium.ttf
          weight: 500
        - asset: assets/fonts/BeVietnamPro-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/BeVietnamPro-Bold.ttf
          weight: 700
